<!DOCTYPE html>
<html lang="pt-br">
<head>
     <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="keywords" content="Navegação, HTML, CSS">
    <meta name="description" content="Navegação em HTML e CSS.">
    <meta name="author" content="Miguel Oliveira">
    <meta name="robots" content="index,follow">
    <meta name="X-UA-Compatible" content="IE=7">
    <link rel="shortcut icon" href="img/icone.png" type="image/x-icon">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://kit.fontawesome.com/a076d05399.js"></script>
    <title>Navegação</title>
</head>
<body>
   <nav>
    <div class="menu">
      <input type="checkbox" id="check">
      <div class="logo"><a href="#">CodingLab</a></div>
        <ul>
          <label class="btn cancel" for="check"><i class="fas fa-times"></i></label>
          <li><a href="#">Home</a></li>
          <li><a href="#">About</a></li>
          <li><a href="#">Services</a></li>
          <li><a href="#">Contact</a></li>
          <li><a href="#">Feedback</a></li>
        </ul>
        <label for="check" class="btn bars"><i class="fas fa-bars"></i></label>
      </div>
    </div>
  </nav>
  <div class="center">
    <div class="upper">
      Responsive Neumorphism Navigation Bar
    </div>
    <div class="lower">
    Using HTML and CSS Only
    </div>
  </div>
</body>
</html>
